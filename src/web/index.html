<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>引擎智能知识问答控制台</title>
    <link rel="stylesheet" href="/assets/styles.css" />
  </head>
  <body>
    <div class="background-orbit orbit-a"></div>
    <div class="background-orbit orbit-b"></div>
    <div class="noise-mask"></div>

    <div id="appShell" class="app-shell">
      <aside class="sidebar">
        <div class="sidebar-toolbar reveal">
          <div class="brand-identity" aria-label="鲸鸿动能">
            <span class="brand-name">鲸鸿动能</span>
          </div>
          <button
            id="sidebarToggleBtn"
            class="sidebar-toggle icon-btn"
            type="button"
            aria-label="隐藏会话栏"
            title="隐藏会话栏"
          >
            <span class="icon-split-panel" aria-hidden="true"></span>
          </button>
          <div id="sidebarCollapsedActions" class="sidebar-collapsed-actions" aria-hidden="true">
            <button
              id="sidebarToggleMiniBtn"
              class="icon-pill-btn"
              type="button"
              aria-label="展开会话栏"
              title="展开会话栏"
              data-tooltip="展开会话栏"
            >
              <span class="icon-split-panel" aria-hidden="true"></span>
            </button>
            <button
              id="newSessionMiniBtn"
              class="icon-pill-btn"
              type="button"
              aria-label="开启新对话"
              title="开启新对话"
              data-tooltip="开启新对话"
            >
              <span class="icon-plus-circle" aria-hidden="true"></span>
            </button>
          </div>
        </div>

        <div class="brand-card reveal">
          <button id="newSessionBtn" class="primary-button sidebar-new-session" type="button">
            <span class="icon-plus-circle" aria-hidden="true"></span>
            <span>开启新对话</span>
          </button>
        </div>

        <section class="sidebar-section reveal">
          <div class="section-title-row">
            <span id="sessionCountTag" class="counter-tag">0</span>
          </div>
          <div id="sessionList" class="session-list"></div>
        </section>
      </aside>

      <main class="workspace">
        <section id="contentGrid" class="content-grid">
          <div class="chat-panel reveal">
            <div id="messageList" class="message-list"></div>
            <div id="draftHeroTitle" class="draft-hero-title">我已经准备好了，今天有什么可以帮到你？</div>

            <form id="composerForm" class="composer">
              <textarea
                id="composerInput"
                name="content"
                rows="4"
                aria-label="输入问题"
                placeholder="按 Enter 发送，按 Ctrl+Enter 换行。"
              ></textarea>
              <div class="composer-footer">
                <div id="composerHint" class="helper-text" hidden></div>
              </div>
            </form>
          </div>

        </section>
      </main>
    </div>

    <script src="/assets/app.js?v=20260313-inline-debug-only-2" defer></script>
  </body>
</html>
